name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall scripts tests

      - name: Run unit and schema tests
        run: python -m unittest discover -s tests -v

      - name: Run dry-run evidence workflow
        run: |
          python scripts/capture/enterocto_capture.py \
            --event examples/sample-event.json \
            --policy config/capture-policy.example.json \
            --output-dir ./evidence-ci

      - name: Confirm dry-run did not capture packets
        run: |
          test ! -e ./evidence-ci/demo-20260616-001/packet/capture.pcap
          test ! -e ./evidence-ci/demo-20260616-001/packet/capture.pcapng
